// zukka CS 1.6 FFA Deathmatch Server WITH BOTS
// Instant respawn, free-for-all deathmatch with AI bots for LAN parties
// Hosted by zukka LAN Community

hostname "zukka FFA DM + Bots"

// Player limits - FFA means no teams
maxplayers 16
mp_limitteams 0
mp_autoteambalance 0

// FFA Deathmatch settings
mp_freeforall 1              // Free-for-all mode (everyone vs everyone)
mp_timelimit 0               // No time limit, play continuously
mp_roundtime 9               // Long rounds for continuous play
mp_freezetime 0              // No freeze time
mp_buytime 0                 // No buy time (weapons provided)
mp_startmoney 0              // No money needed
mp_c4timer 45                // C4 timer (not really used in DM)
mp_friendlyfire 0            // No friendly fire (FFA anyway)
mp_tkpunish 0
mp_autokick 0
mp_forcecamera 0             // Free spectator mode
mp_flashlight 1
mp_footsteps 1
mp_falldamage 0

// Instant respawn settings
mp_forcerespawn 1            // Force respawn
mp_respawn_immunitytime 0    // No spawn protection
mp_round_infinite 1          // Infinite rounds (if supported by ReGameDLL)

// Deathmatch-specific settings
mp_fraglimit 0               // No frag limit
mp_maxrounds 0               // No round limit
sv_restartround 0            // Don't auto-restart rounds

// Weapon and gameplay settings
mp_weaponstay 0              // Weapons disappear when picked up
mp_weaponstay_time 0.5
mp_nadedrops 1               // Drop grenades on death
mp_flashlight 1
mp_footsteps 1

// BOT CONFIGURATION FOR FFA
// ========================================
// Bot difficulty: 0=easy, 1=normal, 2=hard, 3=expert
bot_difficulty 1

// Bot behavior and joining
bot_join_after_player 0       // Bots join immediately, even when empty
bot_auto_vacate 1             // Bots leave when real players join
bot_quota 14                  // Max number of bots (16 total - 2 for players)
bot_quota_mode fill           // Fill empty slots with bots

// Bot team settings (FFA mode - bots on "any" team)
bot_join_team any             // Bots can join any "team" in FFA
bot_auto_follow 0             // Bots don't follow in FFA (no teammates)
bot_chatter off               // Disable bot radio chatter
bot_defer_to_human 1          // Bots defer to human players

// Bot skill settings
bot_stop 0                    // Don't freeze bots
bot_mimic 0                   // Bots don't mimic players
bot_grenades 1                // Bots use grenades
bot_flashlight 0              // Bots don't use flashlights
bot_knives_only 0             // Bots use all weapons
bot_sniper_only 0             // Bots not limited to snipers
bot_pistols_only 0            // Bots not limited to pistols
bot_all_weapons 1             // Bots can use all weapons
bot_prefix "[BOT]"            // Bot name prefix

// FFA-specific bot behavior
bot_allow_rogues 1            // Bots can be "rogue" in FFA
bot_allow_pistols 1           // Bots can use pistols
bot_allow_shotguns 1          // Bots can use shotguns
bot_allow_sub_machine_guns 1  // Bots can use SMGs
bot_allow_rifles 1            // Bots can use rifles
bot_allow_snipers 1           // Bots can use snipers
bot_allow_machine_guns 1      // Bots can use machine guns

// YaPB BOT CONFIGURATION (Enhanced bots with YaPB plugin)
// ========================================
// YaPB provides more advanced AI than standard CS 1.6 bots
// These settings override standard bot commands when YaPB is loaded

// Basic YaPB settings
yb_quota_mode fill            // Fill empty slots with bots
yb_join_after_player 0        // Bots join immediately, even when empty
yb_quota 14                   // Max number of bots (16 total - 2 for players)
yb_join_team any              // Bots can join any "team" in FFA
yb_difficulty 1               // Bot difficulty: 0=easy, 1=normal, 2=hard, 3=expert, 4=nightmare

// Bot behavior
yb_chatter on                 // Enable bot radio chatter
yb_pickup_weapons 1           // Allow bots to pickup weapons
yb_grenades 1                 // Bots use grenades
yb_kick_after_player_connect 1 // Auto-kick bots to make room for real players

// FFA-specific YaPB settings
yb_has_team_semiclip 0        // No team semi-clip (normal collision)
// Note: In FFA mode, bots treat all players as enemies

// Advanced features
yb_rotate_bots 0              // Don't randomly rotate bots (keep consistent)
yb_economics_disrespect_percent 0 // Bots respect economics

// Note: YaPB will automatically load with Metamod plugin system
// Additional configuration in /opt/steam/hlds/cstrike/yapb.cfg

// Server performance
sv_aim 0
sv_maxrate 25000
sv_minrate 10000
sv_maxupdaterate 101
sv_minupdaterate 30
sys_ticrate 100

// Voice settings - alltalk for FFA chaos
sv_alltalk 1                 // Everyone can talk to everyone
sv_voiceenable 1
sv_voicecodec voice_speex
sv_voicequality 3

// Download and security
sv_allowdownload 1
sv_allowupload 0
sv_downloadurl ""
secure 1                     // Keep VAC enabled

// Logging
mp_logdetail 1
mp_logfile 1
mp_logmessages 0

// Spectator settings
allow_spectators 1
sv_spectalk 1

// Map rotation for deathmatch
mapcyclefile mapcycle.txt

// Server contact info
sv_contact "lan@zukkafabrik.de"
sv_region 3                  // Europe

// No password for FFA server
// sv_password ""

// Server specific settings
mp_chattime 10
sv_rcon_maxfailures 5
sv_rcon_banpenalty 5
sv_timeout 65

// RCON password for server administration
rcon_password "zukka_ffa_bots_rcon_secure"

// Note: This server has bots enabled to fill empty slots in FFA mode.
// Bots will automatically join/leave as real players connect/disconnect.
// Good for practicing aim or casual play when there aren't enough human players.

// For true instant respawn, a deathmatch plugin may be needed.
// ReGameDLL may provide additional deathmatch cvars:
// mp_respawn_delay 0
// mp_respawn_immunitytime 0

// Bot commands available via RCON:
// bot_add                    // Add a bot to the game
// bot_kick                   // Remove all bots
// bot_kill                   // Kill all bots
// bot_add_ct                 // Add a bot (CT team - not used in FFA)
// bot_add_t                  // Add a bot (T team - not used in FFA)
// bot_kick all               // Remove all bots

// Recommended plugins for enhanced FFA DM with bots:
// - DeathMatch plugin (for instant respawn)
// - Stats logging
// - Weapon restrictions/randomizer
// - Bot management plugins
