// zukka CS 1.6 Aim Server Configuration
// Aim maps - fast-paced aim training for LAN parties
// Default map: aim_b0n0_d8c71
// Hosted by zukka LAN Community

hostname "zukka Aim Server"

// Player limits - aim maps are usually free-for-all
maxplayers 16
mp_limitteams 0
mp_autoteambalance 0

// Aim gameplay settings
mp_freeforall 1              // Free-for-all mode (everyone vs everyone)
mp_timelimit 0               // No time limit, play continuously
mp_roundtime 5               // Short rounds for fast-paced action
mp_freezetime 0              // No freeze time
mp_buytime 0                 // No buy time (weapons provided)
mp_startmoney 0              // No money needed
mp_c4timer 45                // C4 timer (not used in aim)
mp_friendlyfire 0            // No friendly fire
mp_tkpunish 0
mp_autokick 0
mp_forcecamera 0             // Free spectator mode
mp_flashlight 0              // No flashlights for cleaner gameplay
mp_footsteps 1
mp_falldamage 0

// Instant respawn for aim training
mp_forcerespawn 1            // Force respawn
mp_respawn_immunitytime 0    // No spawn protection
mp_round_infinite 1          // Infinite rounds (no map changes)

// Game limits
mp_fraglimit 0               // No frag limit
mp_roundlimit 0              // No round limit
mp_maxrounds 0               // No max rounds

// Weapon settings for aim
mp_weaponstay 0              // Weapons disappear when picked up
mp_weaponstay_time 0.5
mp_nadedrops 1               // Drop grenades on death

// Server performance
sv_aim 0
sv_maxrate 25000
sv_minrate 10000
sv_maxupdaterate 101
sv_minupdaterate 30
sys_ticrate 100

// Voice settings - alltalk for aim chat
sv_alltalk 1                 // Everyone can talk to everyone
sv_voiceenable 1
sv_voicecodec voice_speex
sv_voicequality 3

// Download and security
sv_allowdownload 1
sv_allowupload 0
sv_downloadurl ""
secure 1                     // VAC enabled

// Logging
mp_logdetail 1
mp_logfile 1
mp_logmessages 0

// Spectator settings
allow_spectators 1
sv_spectalk 1

// Map rotation for aim (aim maps only)
mapcyclefile mapcycle.txt

// Server contact info
sv_contact "lan@zukkafabrik.de"
sv_region 3                  // Europe

// No password for aim server
// sv_password ""

// Server specific settings
mp_chattime 10
sv_rcon_maxfailures 5
sv_rcon_banpenalty 5
sv_timeout 65

// RCON password for server administration
rcon_password "zukka_aim_rcon_secure"

// Note: Aim maps are small, symmetrical maps designed for aim practice.
// Players spawn with weapons and focus on fast reflexes and accuracy.
// No objectives - just pure combat and aim training.

// Recommended plugins for enhanced aim experience:
// - Aim stats plugin (accuracy, headshot percentage)
// - Weapon restrictions/randomizer
// - Spawn protection (optional)
// - Kill sound effects

// Common aim server commands that can be executed via console:
// mp_freezetime 0           // No freeze time
// mp_forcerespawn 1         // Instant respawn
// mp_roundtime 5            // Short 5-minute rounds
// sv_alltalk 1              // All talk enabled

// To add custom aim maps:
// 1. Place .bsp files in maps directory
// 2. Add map names to mapcycle.txt
// 3. Ensure maps are designed for aim training (small, symmetrical)
