// zukka CS 1.6 FFA Deathmatch Server
// Instant respawn, free-for-all deathmatch for LAN parties
// Hosted by zukka LAN Community

hostname "zukka FFA Deathmatch"

// Player limits - FFA means no teams
maxplayers 16
mp_limitteams 0
mp_autoteambalance 0

// FFA Deathmatch settings
mp_freeforall 1              // Free-for-all mode (everyone vs everyone)
mp_timelimit 0               // No time limit, play continuously
mp_roundtime 9               // Long rounds for continuous play
mp_freezetime 0              // No freeze time
mp_buytime 0                 // No buy time (weapons provided)
mp_startmoney 0              // No money needed
mp_c4timer 45                // C4 timer (not really used in DM)
mp_friendlyfire 0            // No friendly fire (FFA anyway)
mp_tkpunish 0
mp_autokick 0
mp_forcecamera 0             // Free spectator mode
mp_flashlight 1
mp_footsteps 1
mp_falldamage 0

// Instant respawn settings
mp_forcerespawn 1            // Force respawn
mp_respawn_immunitytime 0    // No spawn protection
mp_round_infinite 1          // Infinite rounds (if supported by ReGameDLL)

// Deathmatch-specific settings
mp_fraglimit 0               // No frag limit
mp_maxrounds 0               // No round limit
sv_restartround 0            // Don't auto-restart rounds

// Weapon and gameplay settings
mp_weaponstay 0              // Weapons disappear when picked up
mp_weaponstay_time 0.5
mp_nadedrops 1               // Drop grenades on death
mp_flashlight 1
mp_footsteps 1

// Server performance
sv_aim 0
sv_maxrate 25000
sv_minrate 10000
sv_maxupdaterate 101
sv_minupdaterate 30
sys_ticrate 100

// Voice settings - alltalk for FFA chaos
sv_alltalk 1                 // Everyone can talk to everyone
sv_voiceenable 1
sv_voicecodec voice_speex
sv_voicequality 3

// Download and security
sv_allowdownload 1
sv_allowupload 0
sv_downloadurl ""
secure 1                     // Keep VAC enabled

// Logging
mp_logdetail 1
mp_logfile 1
mp_logmessages 0

// Spectator settings
allow_spectators 1
sv_spectalk 1

// Map rotation for deathmatch
mapcyclefile mapcycle.txt

// Server contact info
sv_contact "lan@zukkafabrik.de"
sv_region 3                  // Europe

// No password for FFA server
// sv_password ""

// Server specific settings
mp_chattime 10
sv_rcon_maxfailures 5
sv_rcon_banpenalty 5
sv_timeout 65

// RCON password for server administration
rcon_password "zukka_practice_rcon_secure"

// Note: For true instant respawn, a deathmatch plugin may be needed.
// ReGameDLL may provide additional deathmatch cvars:
// mp_respawn_delay 0
// mp_respawn_immunitytime 0

// Recommended plugins for enhanced FFA DM:
// - DeathMatch plugin (for instant respawn)
// - Stats logging
// - Weapon restrictions/randomizer
