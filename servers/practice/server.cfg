// zukka CS 1.6 Practice Server Configuration
// lan.zukkafabrik.de | Training & Practice Server
// Hosted by zukka LAN Community

hostname "zukka CS 1.6 Practice Server - Training Ground"

// Player limits - allow solo practice or small groups
maxplayers 12
mp_limitteams 0
mp_autoteambalance 0

// Practice-focused game settings
mp_timelimit 0  // No time limit
mp_roundtime 9  // Extended rounds for practice
mp_freezetime 0  // No freeze time
mp_buytime 60  // Extended buy time
mp_startmoney 16000  // Maximum money
mp_c4timer 45
mp_friendlyfire 0  // No friendly fire for safe practice
mp_tkpunish 0
mp_autokick 0
mp_forcecamera 0  // Free spectator mode
mp_flashlight 1
mp_footsteps 1
mp_falldamage 0

// Practice-specific settings
mp_roundlimit 0  // No round limit
sv_cheats 1  // Enable cheats for practice commands
// Note: sv_cheats 1 allows clients to use cheat commands locally
// This is acceptable for a practice server but use with caution

// Unlimited ammo and no reload (common practice features)
// These are cheat commands that players can enable themselves:
// impulse 101 (give full ammo and armor)
// sv_infinite_ammo 1 (infinite ammo, no reload)
// sv_gravity 200 (adjust gravity for jump practice)

// Server performance
sv_aim 0
sv_maxrate 25000
sv_minrate 10000
sv_maxupdaterate 101
sv_minupdaterate 30
sys_ticrate 100

// Voice settings - alltalk for practice coordination
sv_alltalk 1  // Everyone can communicate
sv_voiceenable 1
sv_voicecodec voice_speex
sv_voicequality 5

// Download and security
sv_allowdownload 1
sv_allowupload 0
sv_downloadurl ""
secure 1  // Keep VAC enabled for integrity

// Logging
mp_logdetail 1
mp_logfile 1
mp_logmessages 0

// Spectator settings - important for practice observation
allow_spectators 1
sv_spectalk 1

// Map rotation for practice
mapcyclefile mapcycle.txt

// Server contact info
sv_contact "lan@zukkafabrik.de"
sv_region 3  // Europe

// No password for practice server
// sv_password ""

// Practice server specific settings
mp_chattime 10
sv_rcon_maxfailures 5
sv_rcon_banpenalty 5
sv_timeout 120  // Longer timeout for practice sessions

// Bot settings (if using bots for target practice)
// Note: Bot support depends on AMX plugins or ReGameDLL features
// mp_autoteam 0
// bot_add  // Add bots via console or plugin

// Common practice commands that can be executed via console:
// sv_gravity 800  // Default gravity
// mp_freezetime 0  // Already set
// mp_buytime 60  // Already set

// RCON password for server administration
rcon_password "zukka_practice_rcon_secure"

// zukka LAN Hub Integration
// Check game roster at: lan.zukkafabrik.de
// Tournament brackets at: hub.zukkafabrik.de

// Recommended practice plugins (if using AMX Mod X):
// - Practice Mode plugin
// - BunnyHop plugin
// - KZ Timer plugin
// - Grenade Practice plugin
// - Deathmatch plugin

// Note: This server configuration enables sv_cheats 1.
// This allows players to use cheat commands for practice purposes.
// Consider using practice-specific plugins instead for better control.

