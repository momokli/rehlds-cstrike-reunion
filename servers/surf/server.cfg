// zukka CS 1.6 Surf Server Configuration
// Surf maps - movement and skill based gameplay for LAN parties
// Default map: surf_water-run_2
// Hosted by zukka LAN Community

hostname "zukka Surf Server"

// Player limits - surf is usually free-for-all
maxplayers 16
mp_limitteams 0
mp_autoteambalance 0

// Surf gameplay settings
mp_freeforall 1              // Free-for-all mode
mp_timelimit 0               // No time limit, play continuously
mp_roundtime 15              // Long rounds for surf practice
mp_freezetime 0              // No freeze time
mp_buytime 0                 // No buy time
mp_startmoney 0              // No money needed
mp_c4timer 45                // C4 timer (not used in surf)
mp_friendlyfire 0            // No friendly fire
mp_tkpunish 0
mp_autokick 0
mp_forcecamera 0             // Free spectator mode
mp_flashlight 1
mp_footsteps 1
mp_falldamage 0

// Instant respawn for surf
mp_forcerespawn 1            // Force respawn
mp_respawn_immunitytime 0    // No spawn protection

// Game limits
mp_fraglimit 0               // No frag limit
mp_roundlimit 0              // No round limit
mp_maxrounds 0               // No max rounds

// Weapon settings for surf
mp_weaponstay 0              // Weapons disappear when picked up
mp_weaponstay_time 0.5
mp_nadedrops 1               // Drop grenades on death

// Surf-specific physics (optional - adjust as needed)
// Lower gravity helps with surf movement
sv_gravity 400               // Lower gravity for easier surfing (default 800)

// Speed and movement settings
sv_maxspeed 320              // Max player speed
sv_accelerate 5              // Acceleration rate
sv_airaccelerate 100         // Air acceleration (important for surf)
sv_friction 4                // Surface friction

// Server performance
sv_aim 0
sv_maxrate 25000
sv_minrate 10000
sv_maxupdaterate 101
sv_minupdaterate 30
sys_ticrate 100

// Voice settings - alltalk for surf chat
sv_alltalk 1                 // Everyone can talk to everyone
sv_voiceenable 1
sv_voicecodec voice_speex
sv_voicequality 3

// Download and security
sv_allowdownload 1
sv_allowupload 0
sv_downloadurl ""
secure 1                     // VAC enabled

// Logging
mp_logdetail 1
mp_logfile 1
mp_logmessages 0

// Spectator settings
allow_spectators 1
sv_spectalk 1

// Map rotation for surf (surf maps only)
mapcyclefile mapcycle.txt

// Server contact info
sv_contact "lan@zukkafabrik.de"
sv_region 3                  // Europe

// No password for surf server
// sv_password ""

// Server specific settings
mp_chattime 10
sv_rcon_maxfailures 5
sv_rcon_banpenalty 5
sv_timeout 65

// RCON password for server administration
rcon_password "zukka_surf_rcon_secure"

// Note: Surf maps require specific map geometry with ramps.
// Players use mouse movement to slide down ramps and gain speed.
// The server uses lower gravity and air acceleration for better surf physics.

// Recommended plugins for enhanced surf experience:
// - Surf timer plugin (records best times)
// - Checkpoint system
// - Weapon menu
// - Stats logging

// Common surf commands that can be executed via console:
// sv_gravity 400            // Adjust gravity (lower = easier)
// sv_airaccelerate 100      // Air control for surfing
// mp_weaponstay 0           // Weapons disappear
// mp_forcerespawn 1         // Instant respawn

// To add custom surf maps:
// 1. Place .bsp files in maps directory
// 2. Add map names to mapcycle.txt
// 3. Ensure maps have proper surf geometry
