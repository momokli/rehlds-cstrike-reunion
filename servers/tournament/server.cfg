// zukka CS 1.6 Tournament Server Configuration
// lan.zukkafabrik.de | CS 2v2 Tournament
// Hosted by zukka LAN Community

hostname "zukka CS 2v2 Tournament - Competitive CS 1.6"

// Player limits
maxplayers 8  // 4 players (2v2) + 4 spectators
mp_limitteams 2
mp_autoteambalance 0

// Game settings - Tournament Standard
mp_timelimit 30
mp_roundtime 1.75
mp_freezetime 5
mp_buytime 0.25
mp_startmoney 800
mp_c4timer 35
mp_friendlyfire 1
mp_tkpunish 0
mp_autokick 0
mp_forcecamera 1  // dead players can only spectate teammates
mp_flashlight 0
mp_footsteps 1
mp_falldamage 0

// Competitive settings
sv_aim 0
sv_maxrate 25000
sv_minrate 10000
sv_maxupdaterate 101
sv_minupdaterate 30
sys_ticrate 1000

// Voice settings
sv_alltalk 0  // team only
sv_voiceenable 1
sv_voicecodec voice_speex
sv_voicequality 5

// Download and security
sv_allowdownload 1
sv_allowupload 0
sv_downloadurl ""
secure 1

// Logging for tournament stats
mp_logdetail 3
mp_logfile 1
mp_logmessages 1

// Spectator settings
allow_spectators 1
sv_spectalk 1  // spectators can talk to each other

// Map rotation for 2v2
mapcyclefile mapcycle.txt

// Server contact info
sv_contact "lan@zukkafabrik.de"
sv_region 3  // Europe

// Password for private tournament access
// sv_password "zukka_tournament_2025"

// RCON password for server administration
rcon_password "zukka_tournament_rcon_secure"

// ReGameDLL tournament settings (if available)
// mp_match_restartgame 1
// mp_match_ready_type 1

// zukka Tournament System Integration
// Connect to LAN_HUB for tournament brackets: hub.zukkafabrik.de
