// zukka CS 1.6 Tournament Server Configuration
// LAN Tournament Play - Empty Maps Only
// Hosted by zukka LAN Community

hostname "zukka Tournament 5v5"

// Player limits for 5v5 tournament play
maxplayers 12  // 5v5 (10 players) + 2 spectators
mp_limitteams 2
mp_autoteambalance 0  // Tournament admins handle teams

// Tournament Standard Settings (MR15 format)
mp_timelimit 0         // Use round limit instead of time
mp_roundtime 1.75      // Standard competitive round time
mp_freezetime 5        // Standard freeze time
mp_buytime 0.25        // 15 second buy time
mp_startmoney 800      // Start money
mp_c4timer 35          // C4 timer
mp_friendlyfire 1      // Friendly fire ON for tournament
mp_tkpunish 1          // Punish team killers
mp_autokick 0          // Admins handle kicks
mp_forcecamera 1       // Dead players can only spectate teammates
mp_flashlight 0        // No flashlights
mp_footsteps 1         // Footsteps ON
mp_falldamage 0        // No fall damage

// Match settings
mp_maxrounds 15        // MR15 format (15 rounds per half)
mp_roundlimit 30       // Total rounds for full match (15+15)
mp_fraglimit 0         // No frag limit

// Competitive gameplay settings
sv_aim 0               // No auto-aim
sv_maxrate 25000       // High rate for LAN
sv_minrate 10000       // Minimum rate
sv_maxupdaterate 101   // Max update rate
sv_minupdaterate 30    // Min update rate
sys_ticrate 100        // Server tickrate

// Voice settings - team only for tournament
sv_alltalk 0           // Team talk only
sv_voiceenable 1
sv_voicecodec voice_speex
sv_voicequality 5      // High quality voice

// Download and security
sv_allowdownload 1     // Allow map downloads
sv_allowupload 0       // No uploading
sv_downloadurl ""      // No external downloads
secure 1               // VAC enabled

// Logging for tournament stats
mp_logdetail 3         // Detailed logging
mp_logfile 1           // Enable logging
mp_logmessages 1       // Log chat messages

// Spectator settings
allow_spectators 1     // Allow spectators
sv_spectalk 1          // Spectators can talk to each other

// Map rotation for tournament (empty competitive maps)
mapcyclefile mapcycle.txt

// Server contact info
sv_contact "lan@zukkafabrik.de"
sv_region 3            // Europe

// Password for tournament access (set via RCON before match)
// sv_password "tournament_password_here"

// RCON password for server administration
rcon_password "zukka_tournament_rcon_secure"

// ReGameDLL tournament features (if available)
// mp_match_restartgame 1      // Auto restart after match
// mp_match_ready_type 1       // Ready system for matches

// Empty maps note: Maps should be clean competitive versions
// without extra clutter, spawns, or custom objects.

// Tournament administration commands:
// mp_restartgame 1           // Restart the game
// mp_switchteams             // Switch teams at halftime
// sv_password <pass>         // Set match password
// changelevel <map>          // Change map
// mp_startmoney <amount>     // Adjust start money if needed

// Note: For proper tournament management, consider using:
// - Match config files for different tournament stages
// - Admin plugins for ready system and pause functionality
// - Stats logging plugins for match records
