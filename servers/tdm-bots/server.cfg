// zukka CS 1.6 Team Deathmatch Server WITH BOTS
// Classic team-based casual play with AI bots for LAN parties
// Hosted by zukka LAN Community

hostname "zukka TDM + Bots"

// Player limits - classic 2 teams with bots
maxplayers 16
mp_limitteams 2
mp_autoteambalance 1

// Classic Team Deathmatch settings
mp_freeforall 0               // Teams: Counter-Terrorists vs Terrorists
mp_timelimit 20               // 20 minute time limit per map
mp_roundtime 2.5              // 2.5 minutes per round
mp_freezetime 5               // 5 second freeze time
mp_buytime 0.5                // 30 second buy time
mp_startmoney 800             // Start with $800
mp_c4timer 35                 // C4 timer (still available)
mp_friendlyfire 0             // No friendly fire for casual play
mp_tkpunish 1                 // Punish team killers
mp_autokick 1                 // Auto-kick for team killing
mp_forcecamera 0              // Free spectator mode after death
mp_flashlight 1
mp_footsteps 1
mp_falldamage 0

// Game limits
mp_fraglimit 0                // No frag limit
mp_roundlimit 0               // No round limit
mp_maxrounds 15               // 15 rounds per half (MR15)

// BOT CONFIGURATION
// ========================================
// Bot difficulty: 0=easy, 1=normal, 2=hard, 3=expert
bot_difficulty 1

// Bot behavior and joining
bot_join_after_player 0       // Bots join immediately, even when empty
bot_auto_vacate 1             // Bots leave when real players join
bot_quota 14                  // Max number of bots (16 total - 2 for players)
bot_quota_mode fill           // Fill empty slots with bots

// Bot team settings
bot_join_team any             // Bots can join either team
bot_auto_follow 1             // Bots follow players
bot_chatter off               // Disable bot radio chatter
bot_defer_to_human 1          // Bots defer to human players

// Bot skill settings
bot_stop 0                    // Don't freeze bots
bot_mimic 0                   // Bots don't mimic players
bot_grenades 1                // Bots use grenades
bot_flashlight 0              // Bots don't use flashlights
bot_knives_only 0             // Bots use all weapons
bot_sniper_only 0             // Bots not limited to snipers
bot_pistols_only 0            // Bots not limited to pistols
bot_all_weapons 1             // Bots can use all weapons
bot_prefix "[BOT]"            // Bot name prefix

// YaPB BOT CONFIGURATION (Enhanced bots with YaPB plugin)
// ========================================
// YaPB provides more advanced AI than standard CS 1.6 bots
// These settings override standard bot commands when YaPB is loaded

// Basic YaPB settings
yb_quota_mode fill            // Fill empty slots with bots
yb_join_after_player 0        // Bots join immediately, even when empty
yb_quota 14                   // Max number of bots (16 total - 2 for players)
yb_join_team any              // Bots can join either team
yb_difficulty 1               // Bot difficulty: 0=easy, 1=normal, 2=hard, 3=expert, 4=nightmare

// Bot behavior
yb_chatter on                 // Enable bot radio chatter
yb_pickup_weapons 1           // Allow bots to pickup weapons
yb_grenades 1                 // Bots use grenades
yb_kick_after_player_connect 1 // Auto-kick bots to make room for real players

// Advanced features
yb_rotate_bots 0              // Don't randomly rotate bots (keep consistent)
yb_economics_disrespect_percent 0 // Bots respect economics
yb_has_team_semiclip 0        // No team semi-clip (normal collision)

// Note: YaPB will automatically load with Metamod plugin system
// Additional configuration in /opt/steam/hlds/cstrike/yapb.cfg

// ReDeathmatch Configuration
// ========================================
// ReDeathmatch provides advanced deathmatch features: random spawns, weapon menus, spawn protection
// Enabled for Team Deathmatch server with bots
redm_active 1
redm_mode "tdm"
redm_randomspawn 1
redm_spawn_protection_time 2.0
redm_respawn_delay 0
redm_weapon_menu 1
redm_open_equip_menu_by_g 1
redm_block_drop_weapon 1
redm_bot_weapons "random"

// Note: Spawn points are pre-configured for popular maps (de_dust2, de_inferno, de_train)
// Additional spawns can be added in-game using the spawn editor (/redm editor)

// Server performance
sv_aim 0
sv_maxrate 25000
sv_minrate 5000
sv_maxupdaterate 101
sv_minupdaterate 30
sys_ticrate 100

// Voice settings - alltalk for casual chat
sv_alltalk 1                  // Everyone can talk to everyone
sv_voiceenable 1
sv_voicecodec voice_speex
sv_voicequality 3

// Download and security
sv_allowdownload 1
sv_allowupload 0
sv_downloadurl ""
secure 1                      // VAC enabled

// Logging
mp_logdetail 1
mp_logfile 1
mp_logmessages 0

// Spectator settings
allow_spectators 1
sv_spectalk 1

// Map rotation for casual play
mapcyclefile mapcycle.txt

// Server contact info
sv_contact "lan@zukkafabrik.de"
sv_region 3                   // Europe

// No password for casual server
// sv_password ""

// Server specific settings
mp_chattime 10
sv_rcon_maxfailures 5
sv_rcon_banpenalty 5
sv_timeout 65

// RCON password for server administration
rcon_password "zukka_public_bots_rcon_secure"

// Note: This server has bots enabled to fill empty slots.
// Bots will automatically join/leave as real players connect/disconnect.
// Good for casual play when there aren't enough human players.

// Recommended plugins for enhanced TDM with bots:
// - Team balance plugin
// - Stats logging
// - Map voting
// - Admin tools

// Bot commands available via RCON:
// bot_add                    // Add a bot to the game
// bot_kick                   // Remove all bots
// bot_kill                   // Kill all bots
// bot_add_ct                 // Add a bot to CT team
// bot_add_t                  // Add a bot to T team
// bot_kick ct                // Remove all CT bots
// bot_kick t                 // Remove all T bots
