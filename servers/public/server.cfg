// zukka CS 1.6 Public Server Configuration
// lan.zukkafabrik.de | Casual Public Server
// Hosted by zukka LAN Community

hostname "zukka CS 1.6 Public Server - Casual Fun"

// Player limits
maxplayers 24
mp_limitteams 2
mp_autoteambalance 1

// Game settings - Casual Public
mp_timelimit 20
mp_roundtime 2.5
mp_freezetime 6
mp_buytime 0.5
mp_startmoney 800
mp_c4timer 35
mp_friendlyfire 0
mp_tkpunish 1
mp_autokick 1
mp_forcecamera 0  // dead players can spectate anyone
mp_flashlight 1
mp_footsteps 1
mp_falldamage 0

// Casual settings
sv_aim 0
sv_maxrate 25000
sv_minrate 5000
sv_maxupdaterate 101
sv_minupdaterate 30
sys_ticrate 100

// Voice settings - alltalk for public server
sv_alltalk 1  // everyone can talk to everyone
sv_voiceenable 1
sv_voicecodec voice_speex
sv_voicequality 3

// Download and security
sv_allowdownload 1
sv_allowupload 0
sv_downloadurl ""
secure 1

// Logging
mp_logdetail 1
mp_logfile 1
mp_logmessages 0

// Spectator settings
allow_spectators 1
sv_spectalk 1

// Map rotation for public play
mapcyclefile mapcycle.txt

// Server contact info
sv_contact "lan@zukkafabrik.de"
sv_region 3  // Europe

// No password for public server
// sv_password ""

// Public server specific settings
mp_chattime 10
sv_rcon_maxfailures 5
sv_rcon_banpenalty 5
sv_timeout 65

// RCON password for server administration
rcon_password "zukka_public_rcon_secure"

// zukka LAN Hub Integration
// Check game roster at: lan.zukkafabrik.de
