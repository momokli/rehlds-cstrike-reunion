; Base AMX Mod X plugins configuration for CS 1.6 servers
; This file serves as a template for server-specific plugins.ini files
; Copy this file to individual server directories and customize as needed

; ========================================
; CORE PLUGINS (Recommended for all servers)
; ========================================

; Admin Base - Required for admin functionality
admin.amxx		; admin base (required for any admin-related)

; Basic Administration
admincmd.amxx		; basic admin console commands
adminhelp.amxx		; help command for admin console commands
adminslots.amxx		; slot reservation
multilingual.amxx	; Multi-Lingual management

; Admin Menus
menufront.amxx		; front-end for admin menus
cmdmenu.amxx		; command menu (speech, settings)
plmenu.amxx		; players menu (kick, ban, client cmds.)
mapsmenu.amxx		; maps menu (vote, changelevel)
pluginmenu.amxx		; Menus for commands/cvars organized by plugin

; Chat / Messages
adminchat.amxx		; console chat commands
antiflood.amxx		; prevent clients from chat-flooding the server
scrollmsg.amxx		; displays a scrolling message
imessage.amxx		; displays information messages
adminvote.amxx		; vote commands

; Map Management
nextmap.amxx		; displays next map in mapcycle
mapchooser.amxx		; allows to vote for next map
timeleft.amxx		; displays time left on map

; Configuration
pausecfg.amxx		; allows to pause and unpause some plugins
statscfg.amxx		; allows to manage stats plugins via menu and commands

; ========================================
; COUNTER-STRIKE SPECIFIC PLUGINS
; ========================================

; CS Stats (requires CSX module)
statsx.amxx		; stats on death or round end (CSX Module required!)
miscstats.amxx		; bunch of events announcement for Counter-Strike
;stats_logging.amxx	; weapons stats logging (CSX Module required!)

; ========================================
; INSTALLED THIRD-PARTY PLUGINS
; ========================================

; ReDeathmatch - Advanced deathmatch features (random spawns, weapon menus)
; Uncomment for FFA/TDM servers
;ReDeathmatch.amxx
;redm_spawns.amxx

; GunGame - Weapon progression mode
; Uncomment for GunGame servers
;gungame.amxx

; ========================================
; SERVER TYPE CONFIGURATIONS
; ========================================

; Tournament Server (5v5 competitive):
; Use core plugins + CS stats only
; Disable ReDeathmatch and GunGame

; Public/TDM Server:
; Use core plugins + CS stats
; Optionally enable ReDeathmatch for TDM mode

; FFA/Practice Server:
; Enable ReDeathmatch plugins for random spawns and weapon menus

; GunGame Server:
; Enable GunGame plugin and disable ReDeathmatch

; TDM/FFA with Bots:
; Enable ReDeathmatch plugins and ensure YaPB is loaded in metamod plugins.ini
