// zukka CS 1.6 GunGame Server Configuration
// Free-for-all gun progression mode for LAN parties
// Hosted by zukka LAN Community

hostname "zukka GunGame"

// Player limits - free-for-all gungame
maxplayers 16
mp_limitteams 0
mp_autoteambalance 0

// GunGame settings
mp_freeforall 1               // Free-for-all mode
mp_timelimit 0                // No time limit (play continuously)
mp_roundtime 5                // 5 minute rounds (gungame resets each round)
mp_freezetime 0               // No freeze time
mp_buytime 0                  // No buy time (weapons provided by gungame)
mp_startmoney 0               // No money needed
mp_c4timer 45                 // C4 timer (not used in gungame)
mp_friendlyfire 0             // No friendly fire (FFA anyway)
mp_tkpunish 0
mp_autokick 0
mp_forcecamera 0              // Free spectator mode
mp_flashlight 1
mp_footsteps 1
mp_falldamage 0

// Instant respawn for fast-paced gungame
mp_forcerespawn 1             // Force respawn
mp_respawn_immunitytime 0     // No spawn protection
mp_round_infinite 1           // Infinite rounds (if supported)

// Game limits
mp_fraglimit 0                // No frag limit (gungame uses level progression)
mp_roundlimit 0               // No round limit
mp_maxrounds 0                // No max rounds

// Weapon settings
mp_weaponstay 0               // Weapons disappear when picked up
mp_weaponstay_time 0.5
mp_nadedrops 1                // Drop grenades on death

// Server performance
sv_aim 0
sv_maxrate 25000
sv_minrate 10000
sv_maxupdaterate 101
sv_minupdaterate 30
sys_ticrate 100

// Voice settings - alltalk for gungame chaos
sv_alltalk 1                  // Everyone can talk to everyone
sv_voiceenable 1
sv_voicecodec voice_speex
sv_voicequality 3

// Download and security
sv_allowdownload 1
sv_allowupload 0
sv_downloadurl ""
secure 1                      // VAC enabled

// Logging
mp_logdetail 1
mp_logfile 1
mp_logmessages 0

// Spectator settings
allow_spectators 1
sv_spectalk 1

// Map rotation for gungame
mapcyclefile mapcycle.txt

// Server contact info
sv_contact "lan@zukkafabrik.de"
sv_region 3                   // Europe

// No password for gungame server
// sv_password ""

// Server specific settings
mp_chattime 10
sv_rcon_maxfailures 5
sv_rcon_banpenalty 5
sv_timeout 65

// RCON password for server administration
rcon_password "zukka_gungame_rcon_secure"

// GunGame plugin notes:
// AMX Mod X is installed with GunGame plugin (if configured)
// Typical gungame cvars (if using AMX GunGame plugin):
// amx_gungame 1              // Enable gungame
// amx_gg_trimulti 2          // Triple kills count as 2
// amx_gg_turbo 0             // Turbo mode off
// amx_gg_wstats 1            // Enable stats
// amx_gg_vengence 0          // No vengeance mode
// amx_gg_nadebonus 1         // Enable grenade bonuses

// Recommended gungame maps: Small to medium sized maps work best
// de_dust2, de_inferno, de_nuke, cs_office, de_aztec, de_dust

// To enable gungame via AMX Mod X:
// 1. Ensure amxmodx is loaded in addons/metamod/plugins.ini
// 2. Place gungame plugin in addons/amxmodx/plugins/
// 3. Add "gungame.amxx" to addons/amxmodx/configs/plugins.ini
// 4. Configure gungame settings in addons/amxmodx/configs/gungame.cfg
