# zukka CS 1.6 Tournament Server System
# Part of zukka LAN Tournament Infrastructure
# Uses environment variables for configuration
name: zukka-cs16-tournament-system

services:
  tournament-server:
    build: .
    container_name: cs16-tournament
    restart: unless-stopped
    security_opt:
      - seccomp:unconfined
    environment:
      - GLIBC_TUNABLES=glibc.rtld.execstack=2
    ports:
      - "${TOURNAMENT_PORT:-27015}:27015"
      - "${TOURNAMENT_PORT:-27015}:27015/udp"
    volumes:
      - ./servers/tournament/server.cfg:/opt/steam/hlds/cstrike/config/server.cfg:ro
      - ./servers/tournament/motd.txt:/opt/steam/hlds/cstrike/motd.txt:ro
      - ./servers/tournament/mapcycle.txt:/opt/steam/hlds/cstrike/mapcycle.txt:ro
    stdin_open: true
    tty: true
    command:
      [
        "./hlds_run",
        "-timeout",
        "3",
        "-pingboost",
        "1",
        "-game",
        "cstrike",
        "+hostname",
        "${TOURNAMENT_HOSTNAME:-zukka Tournament 5v5}",
        "+map",
        "de_dust2",
        "+maxplayers",
        "12",
      ]

  public-server:
