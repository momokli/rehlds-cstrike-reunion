# zukka CS 1.6 Tournament Server System
# Part of zukka LAN Tournament Infrastructure
# Uses environment variables for configuration
name: zukka-cs16-tournament-system

services:
  tournament-server:
    build: .
    container_name: cs16-tournament
    restart: unless-stopped
    security_opt:
      - seccomp:unconfined
    environment:
      - GLIBC_TUNABLES=glibc.rtld.execstack=2
    ports:
      - "${TOURNAMENT_PORT:-27015}:27015"
      - "${TOURNAMENT_PORT:-27015}:27015/udp"
    volumes:
      - ./servers/tournament/server.cfg:/opt/steam/hlds/cstrike/config/server.cfg:ro
      - ./servers/tournament/motd.txt:/opt/steam/hlds/cstrike/motd.txt:ro
      - ./servers/tournament/mapcycle.txt:/opt/steam/hlds/cstrike/mapcycle.txt:ro
    stdin_open: true
    tty: true
    command:
      [
        "./hlds_run",
        "-timeout",
        "3",
        "-pingboost",
        "1",
        "-game",
        "cstrike",
        "+hostname",
        "${TOURNAMENT_HOSTNAME:-zukka CS 1.6 Tournament Server - Competitive 5v5}",
        "+map",
        "de_dust2",
        "+maxplayers",
        "12",
      ]

  public-server:
    build: .
    container_name: cs16-public
    restart: unless-stopped
    security_opt:
      - seccomp:unconfined
    environment:
      - GLIBC_TUNABLES=glibc.rtld.execstack=2
    ports:
      - "${PUBLIC_PORT:-27016}:27015"
      - "${PUBLIC_PORT:-27016}:27015/udp"
    volumes:
      - ./servers/public/server.cfg:/opt/steam/hlds/cstrike/config/server.cfg:ro
      - ./servers/public/motd.txt:/opt/steam/hlds/cstrike/motd.txt:ro
      - ./servers/public/mapcycle.txt:/opt/steam/hlds/cstrike/mapcycle.txt:ro
    stdin_open: true
    tty: true
    command:
      [
        "./hlds_run",
        "-timeout",
        "3",
        "-pingboost",
        "1",
        "-game",
        "cstrike",
        "+hostname",
        "${PUBLIC_HOSTNAME:-zukka CS 1.6 Team Deathmatch - Casual Play}",
        "+map",
        "de_dust2",
        "+maxplayers",
        "16",
      ]

  practice-server:
    build: .
    container_name: cs16-practice
    restart: unless-stopped
    security_opt:
      - seccomp:unconfined
    environment:
      - GLIBC_TUNABLES=glibc.rtld.execstack=2
    ports:
      - "${PRACTICE_PORT:-27017}:27015"
      - "${PRACTICE_PORT:-27017}:27015/udp"
    volumes:
      - ./servers/practice/server.cfg:/opt/steam/hlds/cstrike/config/server.cfg:ro
      - ./servers/practice/motd.txt:/opt/steam/hlds/cstrike/motd.txt:ro
      - ./servers/practice/mapcycle.txt:/opt/steam/hlds/cstrike/mapcycle.txt:ro
    stdin_open: true
    tty: true
    command:
      [
        "./hlds_run",
        "-timeout",
        "3",
        "-pingboost",
        "1",
        "-game",
        "cstrike",
        "+hostname",
        "${PRACTICE_HOSTNAME:-zukka CS 1.6 FFA Deathmatch - Instant Respawn}",
        "+map",
        "de_dust2",
        "+maxplayers",
        "16",
      ]

  gungame-server:
    build: .
    container_name: cs16-gungame
    restart: unless-stopped
    security_opt:
      - seccomp:unconfined
    environment:
      - GLIBC_TUNABLES=glibc.rtld.execstack=2
    ports:
      - "${GUNGAME_PORT:-27018}:27015"
      - "${GUNGAME_PORT:-27018}:27015/udp"
    volumes:
      - ./servers/gungame/server.cfg:/opt/steam/hlds/cstrike/config/server.cfg:ro
      - ./servers/gungame/motd.txt:/opt/steam/hlds/cstrike/motd.txt:ro
      - ./servers/gungame/mapcycle.txt:/opt/steam/hlds/cstrike/mapcycle.txt:ro
    stdin_open: true
    tty: true
    command:
      [
        "./hlds_run",
        "-timeout",
        "3",
        "-pingboost",
        "1",
        "-game",
        "cstrike",
        "+hostname",
        "${GUNGAME_HOSTNAME:-zukka CS 1.6 GunGame - Weapon Progression}",
        "+map",
        "de_dust2",
        "+maxplayers",
        "16",
      ]
