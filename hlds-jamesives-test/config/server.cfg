// JamesIves/hlds-docker Test Server Configuration
// Simple config for testing map loading

hostname "JamesIves CS1.6 Test Server"
rcon_password "test_rcon_password"

// Basic server settings
maxplayers 16
sv_lan 0
sv_region 3  // Europe
sv_contact "test@example.com"

// Game settings
mp_timelimit 0
mp_roundtime 999
mp_freezetime 0
mp_buytime 0.25
mp_startmoney 800
mp_c4timer 45
mp_friendlyfire 0
mp_autoteambalance 0
mp_limitteams 0

// Download settings
sv_allowdownload 1
sv_allowupload 0
sv_downloadurl ""

// Voice settings
sv_voiceenable 1
sv_alltalk 0

// Logging
mp_logfile 1
mp_logmessages 1

// Map rotation
mapcyclefile mapcycle.txt

// Note: This is a minimal config for testing purposes
// We want to see if the server can load custom maps
// without falling back to de_dust2 like the blsalin image does
